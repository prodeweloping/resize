<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Size Reducer · Pro Developing</title>
  <link rel="icon" type="image/png" href="Pro.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Tailwind (for navbar/footer only) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font: Inter (bold & clean) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --footer-height: 70px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#1a2980 0%,#26d0ce 100%);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      overflow-x:hidden;
    }

    /* ✅ NEW NAVBAR (blue+orange logo + whatsapp) */
    .new-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.02), 0 2px 6px rgba(0,0,0,0.02);
      padding: 0.6rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo-blue {
      color: #007BFF;
      font-weight: 800;
      font-size: 1.9rem;
      letter-spacing: -0.5px;
    }
    .logo-orange {
      color: #FF6F00;
      font-weight: 800;
      font-size: 1.9rem;
      letter-spacing: -0.5px;
    }
    .whatsapp-nav {
      background-color: #25D366;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.8rem;
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
      box-shadow: 0 6px 12px rgba(37,211,102,0.2);
      text-decoration: none;
    }
    .whatsapp-nav:hover {
      transform: scale(1.12);
      box-shadow: 0 10px 18px rgba(37,211,102,0.35);
    }

    /* floating whatsapp (matches navbar style) */
    .whatsapp-float {
      background-color: #25D366;
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 2rem; box-shadow: 0 8px 20px rgba(37,211,102,0.3);
      transition: transform 0.2s;
      text-decoration: none;
    }
    .whatsapp-float:hover { transform: scale(1.1); }

    /* ================= MAIN CONTAINER ================= */
    .main-wrapper{
      flex:1 0 auto;
      padding-top:96px;
      padding-bottom:calc(var(--footer-height) + 24px);
    }

    .container{
      max-width:1200px;
      margin:0 auto;
      padding:20px;
      color:#333;
    }

    header{
      text-align:center;
      margin-bottom:30px;
      color:white;
    }

    header h1{
      font-size:2.6rem;
      margin-bottom:10px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:12px;
    }

    header p{
      max-width:800px;
      margin:auto;
      opacity:.9;
    }

    /* ================= APP UI ================= */
    .app-container{
      display:flex;
      flex-wrap:wrap;
      gap:30px;
    }

    .upload-section,.preview-section{
      flex:1;
      min-width:300px;
      background:#fff;
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,.2);
      overflow:hidden;
    }

    .section-title{
      padding:18px;
      background:linear-gradient(to right,#1a2980,#26d0ce);
      color:white;
      font-size:1.4rem;
      display:flex;
      gap:10px;
      align-items:center;
    }

    .section-content{ padding:22px; }

    .upload-area{
      border:3px dashed #26d0ce;
      padding:40px 20px;
      border-radius:12px;
      text-align:center;
      cursor:pointer;
      transition:.3s;
    }

    .upload-area:hover{
      background:rgba(38,208,206,.08);
    }

    .upload-icon{
      font-size:3.8rem;
      color:#26d0ce;
      margin-bottom:12px;
    }

    input[type=file]{ display:none; }

    .controls{ margin-top:25px; }

    .control-group{ margin-bottom:22px; }

    .control-label{
      display:flex;
      justify-content:space-between;
      margin-bottom:8px;
      font-weight:600;
    }

    input[type=range]{
      width:100%;
    }

    .buttons{
      display:flex;
      gap:14px;
      margin-top:22px;
    }

    .btn{
      flex:1;
      padding:15px;
      border:none;
      border-radius:8px;
      font-weight:600;
      cursor:pointer;
      transition:.25s;
    }

    /* ✅ GRADIENT BUTTON for Resize (replaces old primary) */
    .btn-gradient {
      background: linear-gradient(145deg, #007BFF, #FF6F00);
      background-size: 150% auto;
      color: white;
      box-shadow: 0 8px 18px rgba(0, 123, 255, 0.25);
    }
    .btn-gradient:hover {
      background-position: right center;
      transform: translateY(-4px);
      box-shadow: 0 16px 26px rgba(255, 111, 0, 0.3);
    }

    .btn-secondary{
      background:#eee;
    }
    .btn-secondary:hover {
      background:#ddd;
    }

    #imagePreview{
      max-width:100%;
      max-height:280px;
      border-radius:10px;
      display:none;
    }

    .file-info{
      background:#f8f9fa;
      padding:15px;
      border-radius:10px;
      margin-top:18px;
    }

    .info-row{
      display:flex;
      justify-content:space-between;
      padding:6px 0;
      border-bottom:1px solid #e5e7eb;
      font-size:.95rem;
    }

    .info-row:last-child{ border:none; }

    .download-section{
      text-align:center;
      margin-top:20px;
      display:none;
    }

    #downloadBtn{
      display:inline-flex;
      gap:10px;
      align-items:center;
      background:linear-gradient(145deg,#059669,#10b981);
      color:white;
      padding:16px 26px;
      border-radius:60px;
      text-decoration:none;
      font-weight:600;
      transition: all 0.3s ease;
    }
    #downloadBtn:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 26px rgba(5,150,105,0.3);
    }

    /* ================= FOOTER (fixed, exact design) ================= */
    footer.fixed-footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--footer-height);
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      padding: 0 16px;
      box-shadow: 0 -4px 20px rgba(2,6,23,0.12);
    }
    .design-footer {
      color: #94a3b8;
      font-size: 1rem;
      font-weight: 400;
    }
    .design-footer .yellow-link {
      color: #fbbf24;
      font-weight: 700;
      text-decoration: none;
    }
    .design-footer .yellow-link:hover {
      text-decoration: underline;
    }

    @media(max-width:768px){
      footer.fixed-footer{ position: fixed; }
      .buttons{ flex-direction:column; }
      header h1{ font-size:2.1rem; }
    }
  </style>
</head>

<body>

<!-- ✅ NEW NAVBAR (Pro blue + Developing orange) with WhatsApp icon -->
<nav class="new-nav">
  <div class="flex items-center">
    <span class="logo-blue">Pro</span>
    <span class="logo-orange">Developing</span>
  </div>
  <a id="waTop" class="whatsapp-nav" href="#" title="Chat on WhatsApp">
    <i class="fa-brands fa-whatsapp"></i>
  </a>
</nav>

<!-- MAIN -->
<div class="main-wrapper">
  <div class="container">

    <header>
      <h1><i class="fas fa-compress-alt"></i> Image Size Reducer</h1>
      <p>Reduce image size from MB to KB directly in your browser.</p>
    </header>

    <div class="app-container">

      <!-- UPLOAD SECTION -->
      <div class="upload-section">
        <div class="section-title"><i class="fas fa-upload"></i> Upload</div>
        <div class="section-content">
          <div class="upload-area" id="uploadArea">
            <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
            <p>Click to upload image</p>
            <small>JPG, PNG, WebP • Max 10MB</small>
            <input type="file" id="imageInput" accept="image/*">
          </div>

          <div class="controls">
            <div class="control-group">
              <div class="control-label">
                <span>Quality</span><span id="qVal">70%</span>
              </div>
              <input type="range" id="quality" min="10" max="95" value="70">
            </div>

            <div class="buttons">
              <!-- ✅ GRADIENT BUTTON for Resize -->
              <button class="btn btn-gradient" id="resizeBtn">
                <i class="fas fa-compress-alt"></i> Resize
              </button>
              <button class="btn btn-secondary" id="resetBtn">
                <i class="fas fa-rotate"></i> Reset
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- PREVIEW SECTION -->
      <div class="preview-section">
        <div class="section-title"><i class="fas fa-image"></i> Preview</div>
        <div class="section-content">
          <img id="imagePreview">
          <p id="noPreview" style="color:#777;padding:40px;text-align:center">
            Preview will appear here
          </p>

          <div class="file-info">
            <div class="info-row"><span>Original</span><span id="origSize">--</span></div>
            <div class="info-row"><span>Resized</span><span id="newSize">--</span></div>
          </div>

          <div class="download-section" id="downloadSection">
            <a id="downloadBtn" download="resized-image.jpg">
              <i class="fas fa-download"></i> Download
            </a>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ✅ NEW FOOTER: "Design by Pro Developing" with yellow link -->
<footer class="fixed-footer">
  <div class="design-footer">
    Design by <a href="https://www.prodeveloping.online/" target="_blank" class="yellow-link">Pro Developing</a>
  </div>
</footer>

<!-- Floating WhatsApp (bottom-right) -->
<a id="waFloat" class="whatsapp-float" href="#" style="position:fixed; right:16px; bottom:calc(var(--footer-height) + 16px); z-index:45;" title="Chat on WhatsApp">
  <i class="fa-brands fa-whatsapp fa-2x"></i>
</a>

<script>
// WhatsApp setup
const waNumber = '916356952788';
const waMessage = encodeURIComponent('Hello! I am using your Image Size Reducer 😊');
document.getElementById('waTop').onclick = e => {
  e.preventDefault();
  window.open(`https://wa.me/${waNumber}?text=${waMessage}`, '_blank');
};
document.getElementById('waFloat').onclick = e => {
  e.preventDefault();
  window.open(`https://wa.me/${waNumber}?text=${waMessage}`, '_blank');
};

// UI elements
const uploadArea=document.getElementById('uploadArea');
const imageInput=document.getElementById('imageInput');
const preview=document.getElementById('imagePreview');
const noPreview=document.getElementById('noPreview');
const quality=document.getElementById('quality');
const qVal=document.getElementById('qVal');
const resizeBtn=document.getElementById('resizeBtn');
const resetBtn=document.getElementById('resetBtn');
const downloadSection=document.getElementById('downloadSection');
const downloadBtn=document.getElementById('downloadBtn');
const origSize=document.getElementById('origSize');
const newSize=document.getElementById('newSize');

let originalImg;

uploadArea.onclick=()=>imageInput.click();

quality.oninput=()=>qVal.innerText=quality.value+'%';

imageInput.onchange=e=>{
  const file=e.target.files[0];
  if(!file)return;
  origSize.innerText=(file.size/1024).toFixed(1)+' KB';
  const reader=new FileReader();
  reader.onload=()=>{
    originalImg=new Image();
    originalImg.onload=()=>{
      preview.src=reader.result;
      preview.style.display='block';
      noPreview.style.display='none';
    };
    originalImg.src=reader.result;
  };
  reader.readAsDataURL(file);
};

resizeBtn.onclick=()=>{
  if(!originalImg)return alert('Upload image first');
  const canvas=document.createElement('canvas');
  canvas.width=originalImg.width;
  canvas.height=originalImg.height;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(originalImg,0,0);
  const data=canvas.toDataURL('image/jpeg',quality.value/100);
  preview.src=data;
  downloadBtn.href=data;
  newSize.innerText=(data.length/1024).toFixed(1)+' KB';
  downloadSection.style.display='block';
};

resetBtn.onclick=()=>location.reload();
</script>

</body>
</html>
